services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      - floci
      - postgres
    environment:
      - S3_ENDPOINT=http://floci:4566
      - S3_BUCKET=oreore-ios-mdm
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY_ID=test
      - S3_SECRET_ACCESS_KEY=test
      - DATABASE_URL=postgres://pguser:pgpassword@postgres:5432/pguser
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - GOOGLE_ALLOWED_USERS
      - MDM_MOBILECONFIG_PAYLOAD_UUID
      - MDM_SERVER_BASE_URL
      - PUSH_CERTIFICATE_PASSWORD
      - PUSH_CERTIFICATE_BASE64
      - SERVER_PRIVATE_KEY_BASE64
      - DEVICE_CERTIFICATE_BASE64
      - DEP_KEY_BASE64
    volumes:
      - .:/app
      - bundle-data:/usr/local/bundle
    ports:
      - 3000:3000
    command: bundle exec rackup --host 0.0.0.0 --port 3000

  testaccount:
    image: ruby:3.2-alpine
    environment:
      - MDM_SERVER_BASE_URL
      - RACK_ENV=production
    volumes:
      - ./testaccount.rb:/app/testaccount.rb
    working_dir: /app
    ports:
      - 4000:4000
    command: sh -c 'gem install rackup sinatra webrick && ruby testaccount.rb -p 4000'

  postgres:
    image: postgres:15-alpine
    restart: always
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      POSTGRES_DB: pguser

  floci:
    image: hectorvent/floci:latest
    ports:
      - "4566:4566"
    volumes:
      - floci-data:/app/data
    environment:
      FLOCI_STORAGE_MODE: persistent
      FLOCI_STORAGE_PERSISTENT_PATH: /app/data

volumes:
  floci-data:
    driver: local
  bundle-data:
    driver: local
  pg-data:
    driver: local
